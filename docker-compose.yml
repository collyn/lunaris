version: '3.8'

services:
  lunaris-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lunaris-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - lunaris-data:/app/data
    environment:
      - SERVER_PORT=8080
      - RUST_LOG=info,server=debug
      # You can pre-configure the secure token for connecting agents here
      # - LUNARIS_TOKEN=your_secure_agent_token_here
      # You can override DATABASE_URL if you want to use a different database file name
      # - DATABASE_URL=sqlite:///app/data/my_custom_lunaris.db

volumes:
  lunaris-data:
    name: lunaris-server-data
