# Lunaris — forced high-refresh virtual display on DP-2 (NVIDIA, X11)
#
# Forces the disconnected DP-2 connector to appear as a connected monitor with a
# real EDID that advertises 1920x1080 @ 144/120/60 Hz (see gen_edid.py). This
# gives the capture pipeline a genuine >60Hz source: the physical DP-1 panel is
# 60Hz-only, so capturing it can never yield more than 60 unique frames/sec.
#
# IMPORTANT: `ConnectedMonitor` REPLACES the driver's connected-monitor list, so
# it MUST enumerate every output you want to keep. Here we list the real
# displays (DP-1, HDMI-0) plus the virtual DP-2 — otherwise the real monitors go
# dark. Adjust the list to match YOUR connected outputs (see `xrandr --query`).
#
# The EDID (CustomEDID) is installed to /etc/X11/lunaris-dp2-edid.bin by apply.sh.
# Tested against: NVIDIA 595.x (open kernel module), Xorg, X11 session.

Section "Device"
    Identifier  "LunarisNvidia"
    Driver      "nvidia"
    # Keep the real monitors AND force the virtual DP-2 on. List every output
    # you want active — ConnectedMonitor overrides auto-detection entirely.
    Option      "ConnectedMonitor" "DP-1, HDMI-0, DP-2"
    # Feed DP-2 a real high-refresh EDID (no physical panel is attached).
    Option      "CustomEDID" "DP-2:/etc/X11/lunaris-dp2-edid.bin"
    # Don't reject the 144Hz pixel clock on the virtual output.
    Option      "ModeValidation" "DP-2: NoMaxPClkCheck, NoEdidMaxPClkCheck"
    # Let X start even with the forced/virtual configuration.
    Option      "AllowEmptyInitialConfiguration" "true"
EndSection
