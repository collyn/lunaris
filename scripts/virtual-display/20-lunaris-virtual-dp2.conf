# Lunaris — forced high-refresh virtual display on DP-2 (NVIDIA, X11)
#
# Forces the disconnected DP-2 connector to appear as a connected monitor with
# 144Hz and 240Hz 1920x1080 modes, WITHOUT a physical panel. This gives the
# capture pipeline a real >60Hz source to grab from (the physical DP-1 panel is
# 60Hz-only, so it can never yield more than 60 unique frames/sec).
#
# The modelines below come from:
#   cvt 1920 1080 144
#   cvt 1920 1080 240
#
# Install: copy to /etc/X11/xorg.conf.d/ and restart X (see apply.sh / README.md).
# Tested against: NVIDIA 595.x (open kernel module), Xorg, X11 session.

Section "Monitor"
    Identifier  "LunarisVirtual"
    Modeline "1920x1080_144.00"  452.50  1920 2088 2296 2672  1080 1083 1088 1177 -hsync +vsync
    Modeline "1920x1080_240.00"  809.50  1920 2104 2312 2704  1080 1083 1088 1248 -hsync +vsync
    Option      "DPMS" "false"
EndSection

Section "Device"
    Identifier  "LunarisNvidia"
    Driver      "nvidia"
    # Pretend DP-2 always has a monitor attached.
    Option      "ConnectedMonitor" "DP-2"
    # Bind the modelines above to DP-2 (NVIDIA-specific "Monitor-<connector>").
    Option      "Monitor-DP-2" "LunarisVirtual"
    # Allow modes that are not present in an EDID (there is no real panel/EDID).
    Option      "ModeValidation" "DP-2: AllowNonEdidModes, NoMaxPClkCheck, NoEdidMaxPClkCheck"
    # Let X start even if the "real" primary is (re)configured.
    Option      "AllowEmptyInitialConfiguration" "true"
EndSection
