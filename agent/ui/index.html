<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunaris Host Agent</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="glow-orb bg-glow-blue"></div>
  <div class="glow-orb bg-glow-purple"></div>
  <div class="app-container">
    <div class="header">
      <div class="logo-section">
        <span class="logo-icon">🌙</span>
        <span class="title">LUNARIS AGENT</span>
      </div>
    </div>

    <!-- Update Banner -->
    <div id="update-banner" class="update-banner" style="display: none;">
      <span id="update-text" class="update-text">A new version of Lunaris Agent is available!</span>
      <button id="update-btn" class="update-btn">Update Now</button>
    </div>

    <div class="dashboard-grid">
      <!-- Status Panel -->
      <div class="panel">
        <div class="panel-title">System Status</div>
        <div class="status-item">
          <span class="status-label">Agent State</span>
          <span id="agent-status-badge" class="status-badge status-offline">
            <span class="badge-dot"></span>
            <span id="agent-status-text">Inactive</span>
          </span>
        </div>
        <div class="status-item">
          <span class="status-label">Sunshine Streamer</span>
          <span id="sunshine-status-badge" class="status-badge status-offline">
            <span class="badge-dot"></span>
            <span id="sunshine-status-text">Not Running</span>
          </span>
        </div>
        <div class="status-item" style="margin-top: 8px;">
          <span class="status-label" style="font-size: 11px;">Agent ID:</span>
          <span id="agent-id-val"
            style="font-family: monospace; font-size: 10px; color: var(--text-secondary);">N/A</span>
        </div>
      </div>

      <!-- Settings Panel -->
      <div class="panel">
        <div class="panel-title">Configuration</div>
        <div class="form-group">
          <label for="server-url">Signaling Server URL</label>
          <input type="text" id="server-url" placeholder="ws://127.0.0.1:8080">
        </div>
        <div class="form-group">
          <label for="server-token">Server Connection Token</label>
          <input type="password" id="server-token" placeholder="Enter token">
        </div>
        <div class="form-group">
          <label for="agent-name">Host Agent Name</label>
          <input type="text" id="agent-name" placeholder="LunarisHost">
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="autostart-sunshine" checked>
            <span>Auto-start Portable Sunshine</span>
          </label>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="autostart-agent">
            <span>Start Agent on System Boot</span>
          </label>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="close-to-tray-agent">
            <span>Close to System Tray</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Action Bar -->
    <div class="actions-bar">
      <button id="toggle-agent-btn" class="btn btn-primary">Start Host Agent</button>
      <button id="save-config-btn" class="btn btn-secondary">Save Configuration</button>
      <button id="import-config-btn" class="btn btn-secondary">Import Config</button>
    </div>

    <!-- Monospace Console Logs -->
    <div class="console-panel">
      <div class="console-header">
        <div class="console-title">Console Output</div>
        <div class="console-actions">
          <button id="clear-logs-btn" class="console-btn">Clear</button>
          <button id="copy-logs-btn" class="console-btn">Copy</button>
        </div>
      </div>
      <div id="console-output" class="console-output"></div>
    </div>
  </div>

  <script src="index.js"></script>
</body>

</html>
