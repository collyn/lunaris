<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunaris Host Agent</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="app-container">
    <div class="header">
      <div class="logo-section">
        <span class="logo-icon">🌙</span>
        <span class="title">LUNARIS AGENT</span>
      </div>
      <div class="version">v0.1.0</div>
    </div>

    <div class="dashboard-grid">
      <!-- Status Panel -->
      <div class="panel">
        <div class="panel-title">System Status</div>
        <div class="status-item">
          <span class="status-label">Agent State</span>
          <span id="agent-status-badge" class="status-badge status-offline">
            <span class="badge-dot"></span>
            <span id="agent-status-text">Inactive</span>
          </span>
        </div>
        <div class="status-item">
          <span class="status-label">Sunshine Streamer</span>
          <span id="sunshine-status-badge" class="status-badge status-offline">
            <span class="badge-dot"></span>
            <span id="sunshine-status-text">Not Running</span>
          </span>
        </div>
        <div class="status-item" style="margin-top: 8px;">
          <span class="status-label" style="font-size: 11px;">Agent ID:</span>
          <span id="agent-id-val" style="font-family: monospace; font-size: 10px; color: var(--text-secondary);">N/A</span>
        </div>
      </div>

      <!-- Settings Panel -->
      <div class="panel">
        <div class="panel-title">Configuration</div>
        <div class="form-group">
          <label for="server-url">Signaling Server URL</label>
          <input type="text" id="server-url" placeholder="ws://127.0.0.1:8080">
        </div>
        <div class="form-group">
          <label for="agent-name">Host Agent Name</label>
          <input type="text" id="agent-name" placeholder="LunarisHost">
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="autostart-sunshine" checked>
            <span>Auto-start Portable Sunshine</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Action Bar -->
    <div class="actions-bar">
      <button id="toggle-agent-btn" class="btn btn-primary">Start Host Agent</button>
      <button id="save-config-btn" class="btn btn-secondary">Save Configuration</button>
    </div>

    <!-- Monospace Console Logs -->
    <div class="console-panel">
      <div class="console-header">
        <div class="console-title">Console Output</div>
        <div class="console-actions">
          <button id="clear-logs-btn" class="console-btn">Clear</button>
          <button id="copy-logs-btn" class="console-btn">Copy</button>
        </div>
      </div>
      <div id="console-output" class="console-output"></div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
