name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang pkg-config libssl-dev libavahi-compat-libdnssd-dev \
            libasound2-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libswresample-dev libopus-dev qt6-base-dev qt6-declarative-dev qt6-multimedia-dev libgl1-mesa-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libavfilter-dev libavdevice-dev libpostproc-dev libpipewire-0.3-dev
          
          # Create dummy libnvidia-fbc.so for the linker in CI
          echo "int main() { return 0; }" | gcc -shared -o libnvidia-fbc.so -x c -
          sudo mv libnvidia-fbc.so /usr/lib/

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-17

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Web Frontend
        run: |
          cd web
          npm ci || npm install
          npm run build

      - name: Build Rust Workspace
        run: cargo build --release --workspace

      - name: Package Server and Web
        run: |
          mkdir -p lunaris-server/web
          cp target/release/server lunaris-server/
          cp -r web/dist lunaris-server/web/dist
          tar -czf lunaris-server-linux.tar.gz -C lunaris-server .

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-linux
          path: lunaris-server-linux.tar.gz

      - name: Install packaging tools
        run: sudo apt-get install -y patchelf

      - name: Package Client Desktop and QML as AppImages
        run: |
          ./scripts/build-appimage.sh client-desktop
          ./scripts/build-appimage.sh client-qml

      - name: Upload Client Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-desktop-linux
          path: build-dir/client-desktop-x86_64.AppImage

      - name: Upload Client QML Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-qml-linux
          path: build-dir/client-qml-x86_64.AppImage

      - name: Upload Agent Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-linux
          path: target/release/agent

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: C:\vcpkg\installed
          key: vcpkg-win-x64-ffmpeg-opus-openssl-v2

      - name: Install C/C++ libraries via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          Add-Content -Path "C:\vcpkg\triplets\x64-windows.cmake" -Value "`nset(VCPKG_BUILD_TYPE release)"
          vcpkg install ffmpeg:x64-windows opus:x64-windows openssl:x64-windows
        shell: pwsh

      - name: Install pkg-config
        run: |
          choco install pkgconfiglite -y
        shell: pwsh

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia qtshadertools'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2026-04-17

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Configure environment
        run: |
          echo "PKG_CONFIG_PATH=C:/vcpkg/installed/x64-windows/lib/pkgconfig" >> $GITHUB_ENV
          echo "VCPKG_ROOT=C:/vcpkg" >> $GITHUB_ENV
          echo "FFMPEG_DIR=C:/vcpkg/installed/x64-windows" >> $GITHUB_ENV
          echo "QMAKE=${QT_ROOT_DIR}/bin/qmake.exe" >> $GITHUB_ENV
        shell: bash

      - name: Debug environment
        run: |
          echo "=== Qt ==="
          echo "QT_ROOT_DIR: $QT_ROOT_DIR"
          echo "QMAKE: $QMAKE"
          which qmake.exe || which qmake || echo "qmake not in PATH"
          ls "$QT_ROOT_DIR/bin/" | head -10 || echo "Cannot list QT_ROOT_DIR/bin"
          echo "=== pkg-config ==="
          which pkg-config || echo "pkg-config not found"
          pkg-config --list-all 2>/dev/null | grep -i opus || echo "opus.pc not found via pkg-config"
          echo "PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
          ls C:/vcpkg/installed/x64-windows/lib/pkgconfig/ || echo "Cannot list pkgconfig dir"
          echo "=== FFmpeg ==="
          pkg-config --libs libavcodec 2>/dev/null || echo "libavcodec.pc not found"
        shell: bash

      - name: Build Web Frontend
        run: |
          cd web
          npm ci || npm install
          npm run build
        shell: pwsh

      - name: Build Rust Workspace
        run: cargo build --release --workspace
        shell: pwsh

      - name: Package Server and Web
        run: |
          New-Item -ItemType Directory -Force -Path lunaris-server/web
          Copy-Item target/release/server.exe -Destination lunaris-server/
          Copy-Item -Recurse web/dist -Destination lunaris-server/web/dist
          Compress-Archive -Path lunaris-server/* -DestinationPath lunaris-server-windows.zip
        shell: pwsh

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-windows
          path: lunaris-server-windows.zip

      - name: Package Client Desktop and Agent
        run: |
          New-Item -ItemType Directory -Force -Path lunaris-client-desktop
          Copy-Item target/release/client-desktop.exe -Destination lunaris-client-desktop/
          & "${env:QT_ROOT_DIR}/bin/windeployqt.exe" --qmldir client-qml/qml --no-translations --compiler-runtime lunaris-client-desktop/client-desktop.exe
          Copy-Item "C:/vcpkg/installed/x64-windows/bin/*.dll" -Destination lunaris-client-desktop/
          Compress-Archive -Path lunaris-client-desktop/* -DestinationPath lunaris-client-desktop-windows.zip
          
          # Package QML Client separately (rename binary and bundle as client-qml)
          Copy-Item -Recurse lunaris-client-desktop -Destination lunaris-client-qml
          Rename-Item lunaris-client-qml/client-desktop.exe -NewName client-qml.exe
          Compress-Archive -Path lunaris-client-qml/* -DestinationPath lunaris-client-qml-windows.zip
          
          # Create Windows NSIS Installer
          makensis client-desktop-installer.nsi

          # Package Agent
          New-Item -ItemType Directory -Force -Path lunaris-agent
          Copy-Item target/release/agent.exe -Destination lunaris-agent/
          Copy-Item "C:/vcpkg/installed/x64-windows/bin/*.dll" -Destination lunaris-agent/
          Compress-Archive -Path lunaris-agent/* -DestinationPath lunaris-agent-windows.zip
        shell: pwsh

      - name: Upload Client Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-desktop-windows
          path: lunaris-client-desktop-windows.zip

      - name: Upload Client QML Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-qml-windows
          path: lunaris-client-qml-windows.zip

      - name: Upload Client Desktop Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-desktop-installer-windows
          path: lunaris-client-installer.exe

      - name: Upload Agent Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-windows
          path: lunaris-agent-windows.zip

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Linux Server Artifact
        uses: actions/download-artifact@v4
        with:
          name: server-linux
          path: ./artifacts/linux-server

      - name: Download Linux Client Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: client-desktop-linux
          path: ./artifacts/linux-client-desktop

      - name: Download Linux Client QML Artifact
        uses: actions/download-artifact@v4
        with:
          name: client-qml-linux
          path: ./artifacts/linux-client-qml

      - name: Download Windows Server Artifact
        uses: actions/download-artifact@v4
        with:
          name: server-windows
          path: ./artifacts/windows-server

      - name: Download Windows Client Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: client-desktop-windows
          path: ./artifacts/windows-client-desktop

      - name: Download Windows Client QML Artifact
        uses: actions/download-artifact@v4
        with:
          name: client-qml-windows
          path: ./artifacts/windows-client-qml



      - name: Download Linux Agent Artifact
        uses: actions/download-artifact@v4
        with:
          name: agent-linux
          path: ./artifacts/linux-agent

      - name: Download Windows Agent Artifact
        uses: actions/download-artifact@v4
        with:
          name: agent-windows
          path: ./artifacts/windows-agent

      - name: Download Windows Client Desktop Installer Artifact
        uses: actions/download-artifact@v4
        with:
          name: client-desktop-installer-windows
          path: ./artifacts/windows-client-desktop-installer



      - name: Organize Release Files
        run: |
          mkdir -p release-files

          # Linux
          mv ./artifacts/linux-server/lunaris-server-linux.tar.gz ./release-files/
          mv ./artifacts/linux-client-desktop/client-desktop-x86_64.AppImage ./release-files/lunaris-client-desktop-linux.AppImage
          mv ./artifacts/linux-client-qml/client-qml-x86_64.AppImage ./release-files/lunaris-client-qml-linux.AppImage
          mv ./artifacts/linux-agent/agent ./release-files/lunaris-agent-linux

          # Windows
          mv ./artifacts/windows-server/lunaris-server-windows.zip ./release-files/
          mv ./artifacts/windows-client-desktop/lunaris-client-desktop-windows.zip ./release-files/
          mv ./artifacts/windows-client-qml/lunaris-client-qml-windows.zip ./release-files/
          mv ./artifacts/windows-agent/lunaris-agent-windows.zip ./release-files/
          mv ./artifacts/windows-client-desktop-installer/lunaris-client-installer.exe ./release-files/lunaris-client-installer-windows.exe



      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          files: |
            release-files/lunaris-server-linux.tar.gz
            release-files/lunaris-client-desktop-linux.AppImage
            release-files/lunaris-client-qml-linux.AppImage
            release-files/lunaris-agent-linux
            release-files/lunaris-server-windows.zip
            release-files/lunaris-client-desktop-windows.zip
            release-files/lunaris-client-qml-windows.zip
            release-files/lunaris-agent-windows.zip
            release-files/lunaris-client-installer-windows.exe

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
