<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="moon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#9d4edd" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Crescent Moon with Gradient -->
  <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" fill="url(#moon-gradient)" filter="url(#glow)" />
  <!-- Small Star inside the crescent -->
  <polygon points="18 5 19 7 21.2 7.2 19.5 8.7 20 11 18 9.7 16 11 16.5 8.7 14.8 7.2 17 7" fill="#00f0ff" filter="url(#glow)" />
</svg>